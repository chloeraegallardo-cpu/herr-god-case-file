<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CASE FILE HG-001</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #9cff9c;
      font-family: "Courier New", monospace;
    }

    #terminal {
      position: relative;
      max-width: 680px;
      margin: 30px auto;
      padding: 24px;
      border: 1px solid #9cff9c;
      background: #020806;
      text-align: center;
      box-shadow: 0 0 30px rgba(156,255,156,.25);
      overflow: hidden;
      animation: flicker 5s infinite;
    }

    #terminal::after {
      content: "";
      pointer-events: none;
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05),
        rgba(255,255,255,.05) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: .18;
    }

    h1 {
      font-size: 22px;
      font-weight: normal;
      letter-spacing: 2px;
    }

    #grid {
      display: inline-block;
      text-align: left;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 5px;
      margin: 20px 0;
      white-space: pre;
    }

    button, a {
      background: black;
      color: #9cff9c;
      border: 1px solid #9cff9c;
      padding: 9px 13px;
      margin: 4px;
      font-family: "Courier New", monospace;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover, a:hover {
      background: #9cff9c;
      color: black;
    }

    .yellow { color: #ffff99; }
    .hidden { display: none; }

    #message {
      min-height: 42px;
    }

    @keyframes flicker {
      0%, 96%, 100% { opacity: 1; }
      97% { opacity: .82; }
      98% { opacity: .96; }
    }
  </style>
</head>

<body>
  <div id="terminal">
    <div id="start">
      <h1>HERR GOD ARCHIVES</h1>
      <p>CASE FILE: HG-001</p>
      <p id="bootText" class="yellow"></p>
      <p>recover the lost transmission.</p>
      <button onclick="startGame()">BEGIN</button>
    </div>

    <div id="game" class="hidden">
      <h1>CASE HG-001</h1>
      <p>use arrow keys or buttons.</p>
      <div id="grid"></div>
      <p id="status">fragments recovered: 0 / 5</p>
      <p id="message">avoid interference. collect the signals.</p>

      <button onclick="move(0,-1)">↑</button><br>
      <button onclick="move(-1,0)">←</button>
      <button onclick="move(0,1)">↓</button>
      <button onclick="move(1,0)">→</button>
    </div>

    <div id="win" class="hidden">
      <h1 class="yellow">SIGNAL REASSEMBLED</h1>
      <p>SOMETHING'S OUT THERE.</p>
      <br>
      <a href="https://open.spotify.com/track/2lbQJBrhFzJbtqoHVVe9GP?si=86d95ac1814d409d" target="_blank">PLAY TRANSMISSION</a>
      <br><br>
      <button onclick="startGame()">REOPEN CASE</button>
    </div>
  </div>

  <script>
    const size = 10;
    const total = 5;

    let player;
    let found;
    let fragments;
    let interference;
    let gameActive = false;

    const files = [
      "RECOVERED FILE 01: they were not stars.",
      "RECOVERED FILE 02: the signal came from below.",
      "RECOVERED FILE 03: do not answer the light.",
      "RECOVERED FILE 04: the water was listening.",
      "RECOVERED FILE 05: something's out there."
    ];

    const bootLines = [
      "ACCESSING DATABASE...",
      "UNKNOWN SIGNAL DETECTED...",
      "DECRYPTING SATELLITE LOGS...",
      "CASE REOPENED...",
      "CLEARANCE LEVEL: UNAUTHORIZED...",
      "OVERRIDE ACCEPTED..."
    ];

    function typeBootText() {
      const text = bootLines[Math.floor(Math.random() * bootLines.length)];
      const el = document.getElementById("bootText");
      let i = 0;
      el.innerText = "";

      const typer = setInterval(() => {
        el.innerText += text[i];
        i++;
        if (i >= text.length) clearInterval(typer);
      }, 45);
    }

    typeBootText();

    function beep(freq = 440, duration = 70) {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();

        osc.connect(gain);
        gain.connect(audio.destination);

        osc.frequency.value = freq;
        gain.gain.value = 0.04;

        osc.start();
        setTimeout(() => {
          osc.stop();
          audio.close();
        }, duration);
      } catch (e) {}
    }

    function startGame() {
      document.getElementById("start").classList.add("hidden");
      document.getElementById("win").classList.add("hidden");
      document.getElementById("game").classList.remove("hidden");

      player = { x: 4, y: 4 };
      found = 0;
      gameActive = true;

      fragments = [];
      interference = [];

      placeRandom(fragments, total);
      placeRandom(interference, 4);

      document.getElementById("status").innerText = "fragments recovered: 0 / 5";
      document.getElementById("message").innerText = "avoid interference. collect the signals.";

      draw();
    }

    function placeRandom(array, amount) {
      while (array.length < amount) {
        const spot = {
          x: Math.floor(Math.random() * size),
          y: Math.floor(Math.random() * size)
        };

        const occupied =
          sameSpot(spot, player) ||
          hasThing(fragments, spot.x, spot.y) ||
          hasThing(interference, spot.x, spot.y);

        if (!occupied) array.push(spot);
      }
    }

    function draw() {
      let output = "";

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          if (player.x === x && player.y === y) {
            output += "🛸";
          } else if (hasThing(fragments, x, y)) {
            output += "✦";
          } else if (hasThing(interference, x, y)) {
            output += "▓";
          } else {
            output += "·";
          }
        }
        output += "\n";
      }

      document.getElementById("grid").innerText = output;
    }

    function hasThing(array, x, y) {
      return array.some(item => item.x === x && item.y === y);
    }

    function sameSpot(a, b) {
      return a.x === b.x && a.y === b.y;
    }

    function move(dx, dy) {
      if (!gameActive) return;

      player.x += dx;
      player.y += dy;

      player.x = Math.max(0, Math.min(size - 1, player.x));
      player.y = Math.max(0, Math.min(size - 1, player.y));

      moveInterference();

      if (hasThing(interference, player.x, player.y)) {
        beep(120, 150);
        document.getElementById("message").innerText = "SIGNAL LOST. interference detected.";
        player = { x: 4, y: 4 };
        draw();
        return;
      }

      for (let i = 0; i < fragments.length; i++) {
        if (fragments[i].x === player.x && fragments[i].y === player.y) {
          fragments.splice(i, 1);
          document.getElementById("message").innerText = files[found];
          found++;

          beep(700, 80);

          document.getElementById("status").innerText =
            "fragments recovered: " + found + " / " + total;

          if (found === total) {
            beep(900, 120);
            gameActive = false;
            document.getElementById("game").classList.add("hidden");
            document.getElementById("win").classList.remove("hidden");
          }

          break;
        }
      }

      draw();
    }

    function moveInterference() {
      interference.forEach(block => {
        const directions = [
          { x: 0, y: -1 },
          { x: 0, y: 1 },
          { x: -1, y: 0 },
          { x: 1, y: 0 },
          { x: 0, y: 0 }
        ];

        const choice = directions[Math.floor(Math.random() * directions.length)];

        block.x += choice.x;
        block.y += choice.y;

        block.x = Math.max(0, Math.min(size - 1, block.x));
        block.y = Math.max(0, Math.min(size - 1, block.y));
      });
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "ArrowUp") move(0, -1);
      if (e.key === "ArrowDown") move(0, 1);
      if (e.key === "ArrowLeft") move(-1, 0);
      if (e.key === "ArrowRight") move(1, 0);
    });
  </script>
</body>
</html>
